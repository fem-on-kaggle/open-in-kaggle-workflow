[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c"  # v6.0.0
hooks = [
    {id = "check-merge-conflict"},
    {
        id = "check-yaml",
        args = ["--unsafe"]
    },
    {id = "check-symlinks"},
    {id = "end-of-file-fixer"},
    {id = "trailing-whitespace"}
]


[[repos]]
repo = "local"
hooks = [
    {
        id = "yamllint",
        name = "Run yamllint",
        entry = "yamllint --strict -d '{extends: default, rules: {document-start: {present: false}, line-length: disable, truthy: {check-keys: false}}}'",
        language = "unsupported",
        types = ["text"],
        files = "\\.(yml|yaml)$"
    }
]
